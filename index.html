<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Схема зала — Ресторан Сандык Алматы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: #2a2a2a;
            border-radius: 30px;
            padding: 30px 25px 25px;
            border: 1px solid #444;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
        }

        h1 {
            color: #f5e6c8;
            font-weight: 300;
            text-align: center;
            letter-spacing: 3px;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #888;
            text-align: center;
            font-size: 14px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .floor-plan {
            background: #1f1f1f;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #3a3a3a;
            overflow: auto;
            position: relative;
        }

        .floor-plan svg {
            display: block;
            width: 100%;
            height: auto;
            background: #1a1a1a;
            border-radius: 12px;
        }

        .table {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .table:hover {
            filter: brightness(1.4) drop-shadow(0 0 15px rgba(184, 134, 11, 0.6));
        }

        .table-text {
            font-size: 13px;
            font-weight: 700;
            fill: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            pointer-events: none;
            user-select: none;
        }

        .column {
            fill: #4a4a4a;
            stroke: #555;
            stroke-width: 1.5;
            opacity: 0.7;
        }

        .column-text {
            font-size: 10px;
            fill: #666;
            text-anchor: middle;
            font-weight: 300;
        }

        .object-label {
            font-size: 11px;
            fill: #999;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-card {
            background: #222;
            max-width: 500px;
            width: 100%;
            border-radius: 28px;
            padding: 30px 25px 25px;
            border: 1px solid #555;
            text-align: center;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: scale(0.95) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-card h2 {
            color: #f5e6c8;
            font-weight: 300;
            font-size: 20px;
        }

        .modal-card .table-number {
            color: #b8860b;
            font-size: 32px;
            font-weight: 700;
            margin: 5px 0 15px;
        }

        .modal-card .table-info {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .modal-card img {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 16px;
            border: 1px solid #444;
            background: #111;
        }

        .modal-card .close-btn {
            margin-top: 18px;
            background: #b8860b;
            border: none;
            color: #fff;
            padding: 12px 35px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }

        .modal-card .close-btn:hover {
            background: #d4a024;
            transform: scale(1.03);
        }

        .modal-card .placeholder-text {
            color: #888;
            background: #2e2e2e;
            padding: 30px 15px;
            border-radius: 12px;
            border: 1px dashed #555;
            font-size: 14px;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px 35px;
            margin-top: 20px;
            padding-top: 18px;
            border-top: 1px solid #333;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
            font-size: 13px;
        }

        .legend-item .shape {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #2ecc71;
            border: 2px solid rgba(255,255,255,0.15);
            flex-shrink: 0;
        }

        .legend-item .shape.rect-h {
            border-radius: 6px;
            width: 40px;
            height: 22px;
        }

        .legend-item .shape.rect-v {
            border-radius: 6px;
            width: 22px;
            height: 35px;
        }

        .legend-item .shape.oval {
            border-radius: 50%;
            width: 40px;
            height: 22px;
        }

        .legend-item .shape.oval-v {
            border-radius: 50%;
            width: 22px;
            height: 35px;
        }

        .legend-item .shape.object {
            background: #555;
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .legend-item .shape.column {
            background: #4a4a4a;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border-color: #555;
        }

        @media (max-width: 768px) {
            .container { padding: 15px 10px; }
            .floor-plan { padding: 10px; }
            .table-text { font-size: 10px; }
            .object-label { font-size: 8px; }
            .column-text { font-size: 8px; }
        }

        @media (max-width: 480px) {
            .table-text { font-size: 8px; }
            .legend { gap: 10px; }
            .legend-item { font-size: 11px; }
        }
    </style>
</head>

        {id:15,type:"round",x:50,y:220,seats:4},

        {id:18,type:"round",x:320,y:230,seats:2},
        {id:19,type:"round",x:430,y:190,seats:2},
        {id:20,type:"round",x:525,y:180,seats:2},

        {id:31,type:"rect_v",x:175,y:440,seats:4},
        {id:32,type:"rect_v",x:175,y:190,seats:6}
    ];

    const typeNames = {
        'round': 'Круглый',
        'rect_h': 'Прямоугольный (горизонтальный)',
        'rect_v': 'Прямоугольный (вертикальный)',
        'oval': 'Овальный (горизонтальный)',
        'oval_v': 'Овальный (вертикальный)'
    };

    const tablesMap = {};
    tablesData.forEach(t => { tablesMap[t.id] = t; });

    // ================================================================
    // 2. ФУНКЦИЯ ДЛЯ ПОЛУЧЕНИЯ ПУТИ К ФОТО
    // ================================================================
    function getTableImagePath(tableId) {
        // Если у вас фото в папке "фото" и названы как "Стол №1.jpg", "Стол №2.jpg" и т.д.
        return `фото/Стол №${tableId}.jpg`;
    }

    // ================================================================
    // 3. ОБРАБОТЧИК КЛИКОВ
    // ================================================================
    const modalOverlay = document.getElementById('modalOverlay');
    const modalNumber = document.getElementById('modalTableNumber');
    const modalInfo = document.getElementById('modalTableInfo');
    const modalImage = document.getElementById('modalTableImage');
    const closeBtn = document.getElementById('closeModalBtn');
    const imageContainer = document.getElementById('modalImageContainer');

    document.querySelectorAll('.table').forEach(tableGroup => {
        tableGroup.addEventListener('click', function(e) {
            e.stopPropagation();
            const id = parseInt(this.dataset.id);
            const number = this.dataset.number;
            
            // Получаем путь к фото
            const imagePath = getTableImagePath(id);
            
            const tableData = tablesMap[id];
            if (tableData) {
                const seatsText = tableData.seats === 1 ? '1 место' : `${tableData.seats} мест`;
                const typeText = typeNames[tableData.type] || 'Стол';
                modalInfo.textContent = `${typeText} · ${seatsText}`;
            } else {
                modalInfo.textContent = '';
            }
            
            openModal(number, imagePath);
        });
    });

    function openModal(number, imageUrl) {
        modalNumber.textContent = `№ ${number}`;
        modalImage.src = imageUrl;
        modalImage.alt = `Фото столика №${number}`;
        modalImage.style.display = 'block';

        const oldPlaceholder = imageContainer.querySelector('.placeholder-text');
        if (oldPlaceholder) oldPlaceholder.remove();

        modalOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        modalOverlay.classList.remove('active');
        document.body.style.overflow = '';
    }

    closeBtn.addEventListener('click', closeModal);

    modalOverlay.addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
            closeModal();
        }
    });

    // ================================================================
    // 4. ЗАГЛУШКА ПРИ ОШИБКЕ ЗАГРУЗКИ ФОТО
    // ================================================================
    modalImage.addEventListener('error', function() {
        this.style.display = 'none';
        const oldPlaceholder = imageContainer.querySelector('.placeholder-text');
        if (oldPlaceholder) oldPlaceholder.remove();

        const placeholder = document.createElement('div');
        placeholder.className = 'placeholder-text';
        placeholder.textContent = `🖼️ Фото для столика №${modalNumber.textContent.replace('№ ', '')} не найдено\n(проверьте папку "фото")`;
        imageContainer.appendChild(placeholder);
    });

    modalImage.addEventListener('load', function() {
        this.style.display = 'block';
        const oldPlaceholder = imageContainer.querySelector('.placeholder-text');
        if (oldPlaceholder) oldPlaceholder.remove();
    });

    console.log('✅ Схема зала загружена! Всего столов:', tablesData.length);
    console.log('📁 Фото должны лежать в папке "фото/" с названиями "Стол №1.jpg", "Стол №2.jpg" и т.д.');
</script>
